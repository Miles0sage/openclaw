name: OpenClaw Job Runner
on:
  issues:
    types: [labeled]

jobs:
  run-job:
    if: github.event.label.name == 'openclaw-job'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: ${{ github.event.issue.body }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 15
