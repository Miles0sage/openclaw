name: OpenClaw Job Runner
on:
  issues:
    types: [labeled]

jobs:
  run-job:
    if: github.event.label.name == 'openclaw-job'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are an autonomous agent. Execute the task described in the issue body.
            Use tools (Bash, Read, Write, Edit, Glob, Grep) to complete the work.
            After completion, summarize what was done.

            TASK:
            ${{ github.event.issue.body }}
          label_trigger: "openclaw-job"
